name: "Design"
description: "Grafik-Design Auftrag oder Anpassung"
title: "[Design]: "
labels: ["type:design", "status:inbox"]
body:
  - type: markdown
    attributes:
      value: |
        ## Neuer Design Task
        Bitte alle relevanten Felder ausfullen.

  - type: input
    id: client
    attributes:
      label: Client
      description: "4-Buchstaben Client-Code (z.B. AARV, ROEN)"
      placeholder: "AARV"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: "Was muss gemacht werden?"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Prioritat
      options:
        - high
        - medium
        - low
      default: 1
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - design
        - frontend
        - cms
      default: 0
    validations:
      required: false

  - type: input
    id: deadline
    attributes:
      label: Deadline
      description: "Optional: Bis wann?"
      placeholder: "2026-06-15"
    validations:
      required: false
